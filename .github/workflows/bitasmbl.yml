
name: Bitasmbl Validation

on:
  push:
    branches: [main]

jobs:
  scaffold:
    if: github.event.head_commit.message == 'bitasmbl:init'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Frontend
        run: npx create-next-app@latest ./frontend
      - name: Commit scaffold
        run: |
          git config user.name "bitasmbl-bot"
          git config user.email "bot@bitasmbl.com"
          git add .
          git commit -m "bitasmbl: scaffold project"
          git push

